version: '3.8'

services:
  # Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql_agenda
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: agenda_db
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  # Interfaz para gestionar la BD
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_agenda
    links:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1

  # Backend (Node.js) - Se construirá después
  api:
    build: ./backend
    container_name: node_api
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root_password
      DB_NAME: agenda_db

  # Frontend (Angular)
  web:
    build: ./sofia-safar-landing
    container_name: angular_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  db_data: