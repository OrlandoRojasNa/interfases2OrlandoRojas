<section id="servicios" class="servicios">

  <div class="contenedor">

    <h2>Nuestros Servicios</h2>
    <p class="subtitulo">
      Tratamientos especializados para el cuidado integral de tu piel
    </p>

    <div class="slider">
      <article class="card" *ngFor="let service of services; trackBy: trackByServiceId">
        <img [src]="service.image" [alt]="service.title" />
        <div class="card-body">
          <h3>{{ service.title }}</h3>
          <p>{{ service.description }}</p>
          <div class="card-footer">
            <strong>{{ service.price | currency:'COP':'symbol-narrow':'1.0-0' }}</strong>
            <button type="button" class="add-cart-btn" (click)="addToCart(service)">
              Agregar al carrito
            </button>
          </div>
        </div>
      </article>
    </div>

  </div>

</section>
